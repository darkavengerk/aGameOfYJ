name: Build & Deploy TTS Assets

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh-pages 브랜치 푸시에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Korean fonts
        run: sudo apt-get install -y fonts-wqy-zenhei

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Build deploy assets
        run: python build.py

      - name: Deploy to gh-pages
        run: |
          # 루트 index.html을 홈페이지로 deploy/에 복사
          cp index.html deploy/index.html

          # deploy/ 내용을 gh-pages 브랜치에 배포 (orphan push)
          cd deploy
          git init -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: rebuild TTS assets [skip ci]"
          git remote add origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin gh-pages --force
