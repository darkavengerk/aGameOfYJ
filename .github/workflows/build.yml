name: Build & Deploy TTS Assets

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # deploy/ 커밋·푸시에 필요
      pages: write      # GitHub Pages 배포에 필요
      id-token: write   # Pages OIDC 인증에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Korean fonts
        run: sudo apt-get install -y fonts-wqy-zenhei

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Build deploy assets
        run: python build.py --deploy

      - name: Commit deploy assets to master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/
          git diff --cached --quiet || git commit -m "chore: rebuild TTS deploy assets [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
